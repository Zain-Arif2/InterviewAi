services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - interviewai-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - interviewai-network

networks:
  interviewai-network:
    driver: bridge

volumes:
  redis-data:
    driver: local